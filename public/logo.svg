<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" width="920" height="260" fill="none">
  <defs>
    <linearGradient id="ssGrad" x1="40" y1="34" x2="230" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#37e5ff"/>
    </linearGradient>
    <linearGradient id="ssHi" x1="135" y1="30" x2="135" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ssWord" x1="300" y1="90" x2="880" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b7a6ff"/>
      <stop offset="0.55" stop-color="#37e5ff"/>
      <stop offset="1" stop-color="#ff8fd0"/>
    </linearGradient>
    <filter id="ssSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#7c5cff" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- mark -->
  <g transform="translate(30,30)">
    <rect x="0" y="0" width="200" height="200" rx="64" fill="url(#ssGrad)" filter="url(#ssSoft)"/>
    <rect x="0" y="0" width="200" height="200" rx="64" fill="url(#ssHi)"/>
    <rect x="0" y="0" width="200" height="200" rx="64" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <g stroke="#0b0920" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(20,20) scale(0.703)">
      <path d="M172 214 H322"/>
      <path d="M296 184 L330 214 L296 244"/>
      <path d="M340 298 H190"/>
      <path d="M216 268 L182 298 L216 328"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="266" y="158" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-size="96" font-weight="700" letter-spacing="-2">
    <tspan fill="#f2efff">Shadow</tspan><tspan fill="url(#ssWord)">Swap</tspan>
  </text>
  <text x="270" y="205" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="26" font-weight="500" letter-spacing="0.5" fill="#9b93c9">Confidential swaps on public Uniswap · iExec Nox</text>
</svg>
